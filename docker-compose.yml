services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: qwen-vllm-backend-nginx
    environment:
      - CUDA_VISIBLE_DEVICES=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    ports:
      - "8012:8000"
    volumes:
      - /media/disk1/model:/root/.cache/huggingface
    command: [ "--model", "baidu/Qianfan-OCR", "--trust-remote-code", "--max-model-len", "8192", "--gpu-memory-utilization", "0.6", "--quantization", "fp8" ]

    ipc: host
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen-gateway-api-nginx
    command: [ "python", "app_new.py" ]
    ports:
      - "8011:8001"
    environment:
      - VLLM_API_URL=http://vllm:8000/v1
      - VLLM_MODEL_ID=baidu/Qianfan-OCR
      - CUDA_VISIBLE_DEVICES=""
    depends_on:
      - vllm
    volumes:
      - /media:/media
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: qwen-gateway-proxy-nginx
    ports:
      - "8010:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: qwen-gateway-tunnel-nginx
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "nginx:80"
      - "--domain=steadier-grit-seldom.ngrok-free.dev"
