server {
    listen 80;
    server_name localhost;

    # Limit payload size to 10MB to match maximum allowed file size
    client_max_body_size 10M;

    # Route all requests to the FastAPI gateway container
    location / {
        proxy_pass http://gateway:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering to allow streaming responses if needed
        proxy_buffering off;

        # Increase timeouts for slow model inference calls
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
